{% extends "base.html" %}
{% block content %}
<h2>Stash 🔖</h2>
<a href="/logout">Logout</a>
<div id="messages" style="border:1px solid #ccc; height:400px; overflow-y:scroll; padding:10px; margin:10px 0;"></div>
<input type="text" id="input" placeholder="e.g. Save https://example.com under tag reading" style="width:500px;">
<button onclick="sendMessage()">Send</button>

<script>
let messages = [];

async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    
    addMessage('You', text);
    messages.push({role: 'user', content: text});
    input.value = '';

    const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({messages})
    });
    const data = await res.json();
    addMessage('Stash AI', data.reply);
    messages.push({role: 'assistant', content: data.reply});
}

function addMessage(sender, text) {
    const div = document.getElementById('messages');
    div.innerHTML += `<p><b>${sender}:</b> ${text}</p>`;
    div.scrollTop = div.scrollHeight;
}

document.getElementById('input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendMessage();
});
</script>
{% endblock %}
